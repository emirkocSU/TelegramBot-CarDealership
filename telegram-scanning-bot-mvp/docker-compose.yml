version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: car_bot_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-car_listing_bot}
      POSTGRES_USER: ${POSTGRES_USER:-car_bot_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure_password_change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - car_bot_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-car_bot_user} -d ${POSTGRES_DB:-car_listing_bot}"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis for Caching and Rate Limiting
  redis:
    image: redis:7-alpine
    container_name: car_bot_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - car_bot_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Main Telegram Bot Application
  telegram_bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: car_bot_telegram
    environment:
      # Database Configuration
      DATABASE_URL: postgresql://${POSTGRES_USER:-car_bot_user}:${POSTGRES_PASSWORD:-secure_password_change_me}@postgres:5432/${POSTGRES_DB:-car_listing_bot}
      
      # Redis Configuration
      REDIS_URL: redis://redis:6379/0
      
      # Telegram Bot Configuration
      BOT_TOKEN: ${BOT_TOKEN}
      BOT_USERNAME: ${BOT_USERNAME}
      WEBHOOK_URL: ${WEBHOOK_URL}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      
      # YOLOv8 Configuration
      YOLO_MODEL_PATH: /app/models/car_damage_yolo.pt
      YOLO_CONFIDENCE_THRESHOLD: 0.5
      YOLO_DEVICE: cpu
      
      # Car Scanner Configuration
      SCAN_INTERVAL: 300
      MAX_IMAGES_PER_LISTING: 5
      BASE_LISTING_URL: https://www.sahibinden.com
      
      # Security Configuration
      SECRET_KEY: ${SECRET_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      
      # Logging Configuration
      LOG_LEVEL: INFO
      LOG_FILE: /app/logs/bot.log
      
      # Production Settings
      ENVIRONMENT: production
      DEBUG: false
      
    volumes:
      - ./models:/app/models:ro
      - ./logs:/app/logs
      - ./data:/app/data
    ports:
      - "8080:8080"  # Webhook port
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - car_bot_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.5'

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: car_bot_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - telegram_bot
    restart: unless-stopped
    networks:
      - car_bot_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Monitoring with Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: car_bot_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - car_bot_network

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: car_bot_grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
      GF_USERS_ALLOW_SIGN_UP: false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    restart: unless-stopped
    networks:
      - car_bot_network

  # Background Job Scheduler
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: car_bot_scheduler
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-car_bot_user}:${POSTGRES_PASSWORD:-secure_password_change_me}@postgres:5432/${POSTGRES_DB:-car_listing_bot}
      REDIS_URL: redis://redis:6379/0
      BOT_TOKEN: ${BOT_TOKEN}
      YOLO_MODEL_PATH: /app/models/car_damage_yolo.pt
      SCAN_INTERVAL: 300
      LOG_LEVEL: INFO
      ENVIRONMENT: production
    volumes:
      - ./models:/app/models:ro
      - ./logs:/app/logs
      - ./data:/app/data
    command: ["python", "-m", "tgbot.scheduler"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - car_bot_network
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'

  # Log Aggregation
  filebeat:
    image: docker.elastic.co/beats/filebeat:8.8.0
    container_name: car_bot_filebeat
    user: root
    volumes:
      - ./logs:/app/logs:ro
      - ./monitoring/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - ELASTICSEARCH_HOSTS=elasticsearch:9200
    depends_on:
      - telegram_bot
    restart: unless-stopped
    networks:
      - car_bot_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  car_bot_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16